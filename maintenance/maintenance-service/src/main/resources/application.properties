spring.application.name=maintenance-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/aquarium_ms
spring.jpa.properties.hibernate.default_schema=maintenance
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# URLs dei microservizi
services.water-parameters.url=http://localhost:8085/api
services.manual-parameters.url=http://localhost:8086/api
services.target-parameters.url=http://localhost:8087/api

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Error handling - do not expose internals
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.it.f3rren.aquarium=INFO
logging.level.org.springframework.web=INFO
