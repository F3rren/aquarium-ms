# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — aquariums-service → ECR → ECS Fargate
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   AWS_ACCESS_KEY_ID       IAM access key with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY   Matching secret key
#   AWS_REGION              e.g. eu-west-1
#   ECR_REPOSITORY          ECR repo name, e.g. aquariums-service
#   ECS_CLUSTER             ECS cluster name, e.g. aquarium-ms-cluster
#   ECS_SERVICE             ECS service name, e.g. aquariums-service
#   ECS_CONTAINER_NAME      Container name inside the task definition
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy aquariums-service

on:
  push:
    branches: [main]
    paths:
      - 'services/aquariums-service/**'
  workflow_dispatch:   # manual trigger from any branch (e.g. claude_check for staging tests)

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:      ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:      ${{ secrets.ECS_SERVICE }}
  CONTAINER_NAME:   ${{ secrets.ECS_CONTAINER_NAME }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Run unit tests before touching AWS
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: sa
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven           # caches ~/.m2 between runs for faster builds

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: sa
          DB_PASSWORD: sa
        run: |
          chmod +x mvnw
          ./mvnw test -B -Dmaven.compiler.release=17
        working-directory: services/aquariums-service

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build Docker image, push to ECR, update ECS task definition
# Runs only if tests pass, and only on pushes to main
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test               # blocked until test job succeeds
    environment: production   # enables GitHub environment protection rules

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── AWS auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── ECR login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build & push ───────────────────────────────────────────────
      # Image is tagged with the commit SHA (immutable) and also :latest
      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" services/aquariums-service
          docker tag  "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      # ── ECS task definition ───────────────────────────────────────────────
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            --output json > /tmp/task-definition.json

      # Swap in the new image URI, keeping every other field unchanged
      - name: Render updated task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  /tmp/task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      # Register the new task definition revision and update the service
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true   # workflow fails if health checks don't pass
