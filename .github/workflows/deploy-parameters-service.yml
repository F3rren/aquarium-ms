# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — parameters-service → ECR → ECS Fargate
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   PARAMETERS_ECR_REPOSITORY
#   PARAMETERS_ECS_CLUSTER
#   PARAMETERS_ECS_SERVICE
#   PARAMETERS_ECS_CONTAINER
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy parameters-service

on:
  push:
    branches: [main]
    paths:
      - 'services/parameters-service/**'
  workflow_dispatch:

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.PARAMETERS_ECR_REPOSITORY }}
  ECS_CLUSTER:    ${{ secrets.PARAMETERS_ECS_CLUSTER }}
  ECS_SERVICE:    ${{ secrets.PARAMETERS_ECS_SERVICE }}
  CONTAINER_NAME: ${{ secrets.PARAMETERS_ECS_CONTAINER }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: sa
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: sa
          DB_PASSWORD: sa
        run: |
          chmod +x mvnw
          ./mvnw clean test -B -Dmaven.compiler.release=17
        working-directory: services/parameters-service

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" services/parameters-service
          docker tag  "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            --output json > /tmp/task-definition.json

      - name: Render updated task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  /tmp/task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
