# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — maintenance-service → ECR → ECS Fargate
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   AWS_ACCESS_KEY_ID              IAM access key with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY          Matching secret key
#   AWS_REGION                     e.g. eu-central-1
#   MAINTENANCE_ECR_REPOSITORY     ECR repo name for maintenance-service
#   MAINTENANCE_ECS_CLUSTER        ECS cluster name
#   MAINTENANCE_ECS_SERVICE        ECS service name
#   MAINTENANCE_ECS_CONTAINER      Container name inside the task definition
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy maintenance-service

on:
  push:
    branches: [main]
    paths:
      - 'services/maintenance-service/**'
  workflow_dispatch:

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.MAINTENANCE_ECR_REPOSITORY }}
  ECS_CLUSTER:    ${{ secrets.MAINTENANCE_ECS_CLUSTER }}
  ECS_SERVICE:    ${{ secrets.MAINTENANCE_ECS_SERVICE }}
  CONTAINER_NAME: ${{ secrets.MAINTENANCE_ECS_CONTAINER }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Run unit tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw test -B -Dmaven.compiler.release=17
        working-directory: services/maintenance-service

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build Docker image, push to ECR, update ECS task definition
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" services/maintenance-service
          docker tag  "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text)
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query taskDefinition \
            --output json > /tmp/task-definition.json

      - name: Render updated task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  /tmp/task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
