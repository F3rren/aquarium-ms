input {
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # Per raccogliere i log dai container Docker
  gelf {
    port => 12201
    type => docker
  }
}

filter {
  # Parse del timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  # Aggiungi metadata utili
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "aquarium-logs"
    }
  }
  
  # Gestione degli errori Java
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "aquarium-logs-%{+YYYY.MM.dd}"
  }
  
  # Output per debug (opzionale)
  stdout {
    codec => rubydebug
  }
}
