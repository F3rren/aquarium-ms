global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aquarium-monitor'

# Configurazione Alertmanager (opzionale)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus stesso
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          application: 'api-gateway'
          service: 'gateway'

  # Core Services
  - job_name: 'aquariums-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['aquariums-service:8081']
        labels:
          application: 'aquariums-service'
          domain: 'core'

  - job_name: 'maintenance-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['maintenance-service:8084']
        labels:
          application: 'maintenance-service'
          domain: 'core'

  # Inhabitants Services
  - job_name: 'inhabitants-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inhabitants-service:8082']
        labels:
          application: 'inhabitants-service'
          domain: 'inhabitants'

  - job_name: 'species-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['species-service:8083']
        labels:
          application: 'species-service'
          domain: 'inhabitants'

  # Parameters Services
  - job_name: 'parameters-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['parameters-service:8085']
        labels:
          application: 'parameters-service'
          domain: 'parameters'

  - job_name: 'manual-parameters-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['manual-parameters-service:8086']
        labels:
          application: 'manual-parameters-service'
          domain: 'parameters'

  - job_name: 'target-parameters-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['target-parameters-service:8087']
        labels:
          application: 'target-parameters-service'
          domain: 'parameters'

