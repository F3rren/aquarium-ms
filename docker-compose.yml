services:

  # ── Database ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: aquarium_ms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - aquarium-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Services ─────────────────────────────────────────────────────────────
  aquariums-service:
    build:
      context: ./services/aquariums-service
      dockerfile: Dockerfile
    container_name: aquariums-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  maintenance-service:
    build:
      context: ./services/maintenance-service
      dockerfile: Dockerfile
    container_name: maintenance-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  # ── Inhabitants Services ──────────────────────────────────────────────────────
  inhabitants-service:
    build:
      context: ./services/inhabitants-service
      dockerfile: Dockerfile
    container_name: inhabitants-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8082
      SPECIES_SERVICE_URL: http://species-service:8083/species
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  species-service:
    build:
      context: ./services/species-service
      dockerfile: Dockerfile
    container_name: species-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  # ── Parameters Services ───────────────────────────────────────────────────────
  parameters-service:
    build:
      context: ./services/parameters-service
      dockerfile: Dockerfile
    container_name: parameters-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  manual-parameters-service:
    build:
      context: ./services/manual-parameters-service
      dockerfile: Dockerfile
    container_name: manual-parameters-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  target-parameters-service:
    build:
      context: ./services/target-parameter-service
      dockerfile: Dockerfile
    container_name: target-parameters-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aquarium_ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8087
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aquarium-network

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      SERVER_PORT: 8080
      AQUARIUMS_SERVICE_URL: http://aquariums-service:8081
      INHABITANTS_SERVICE_URL: http://inhabitants-service:8082
      SPECIES_SERVICE_URL: http://species-service:8083
      MAINTENANCE_SERVICE_URL: http://maintenance-service:8084
      PARAMETERS_SERVICE_URL: http://parameters-service:8085
      MANUAL_PARAMETERS_SERVICE_URL: http://manual-parameters-service:8086
      TARGET_PARAMETERS_SERVICE_URL: http://target-parameters-service:8087
    ports:
      - "8080:8080"
    depends_on:
      - aquariums-service
      - inhabitants-service
      - species-service
      - maintenance-service
      - parameters-service
      - manual-parameters-service
      - target-parameters-service
    networks:
      - aquarium-network

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - aquarium-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - aquarium-network
    restart: unless-stopped

networks:
  aquarium-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
