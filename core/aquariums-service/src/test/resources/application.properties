# ========================================
# Test configuration — uses H2 in-memory DB
# ========================================

# H2 in PostgreSQL compatibility mode, creates the 'core' schema on startup
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS core
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let JPA create/drop schema from entities instead of Flyway
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=core

# Disable Flyway — DDL is handled by Hibernate above
spring.flyway.enabled=false

# Stub URLs — these have defaults in application.properties already, but made explicit here
services.water-parameters.url=http://localhost:8085/api
services.manual-parameters.url=http://localhost:8086/api
services.target-parameters.url=http://localhost:8087/api

# Disable DB health check (no real DB in tests)
management.health.db.enabled=false
