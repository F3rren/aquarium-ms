spring.application.name=aquariums-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/aquarium_ms
spring.jpa.properties.hibernate.default_schema=core
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Do not expose stack traces in error responses
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

# URLs dei microservizi
services.water-parameters.url=http://localhost:8085/api
services.manual-parameters.url=http://localhost:8086/api
services.target-parameters.url=http://localhost:8087/api

# Actuator Configuration - expose only safe endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.it.f3rren.aquarium=INFO
logging.level.org.springframework.web=INFO
