spring.application.name=aquariums-service
server.port=8081

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.default_schema=core
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=core    
spring.flyway.default-schema=core
spring.flyway.baseline-on-migrate=true
spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Do not expose stack traces in error responses
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never

# URLs dei microservizi
services.water-parameters.url=${WATER_PARAMETERS_URL:http://localhost:8085/api}
services.manual-parameters.url=${MANUAL_PARAMETERS_URL:http://localhost:8086/api}
services.target-parameters.url=${TARGET_PARAMETERS_URL:http://localhost:8087/api}

# Actuator Configuration - expose only safe endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Logging Configuration
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.it.f3rren.aquarium=INFO
logging.level.org.springframework.web=INFO

# ========================================
# Resilience4j Circuit Breaker Configuration
# ========================================
resilience4j.circuitbreaker.instances.waterParameters.sliding-window-size=10
resilience4j.circuitbreaker.instances.waterParameters.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.waterParameters.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.waterParameters.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.manualParameters.sliding-window-size=10
resilience4j.circuitbreaker.instances.manualParameters.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.manualParameters.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.manualParameters.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.targetParameters.sliding-window-size=10
resilience4j.circuitbreaker.instances.targetParameters.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.targetParameters.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.targetParameters.permitted-number-of-calls-in-half-open-state=3

# ========================================
# Resilience4j Retry Configuration
# ========================================
resilience4j.retry.instances.waterParameters.max-attempts=3
resilience4j.retry.instances.waterParameters.wait-duration=500ms

resilience4j.retry.instances.manualParameters.max-attempts=3
resilience4j.retry.instances.manualParameters.wait-duration=500ms

resilience4j.retry.instances.targetParameters.max-attempts=3
resilience4j.retry.instances.targetParameters.wait-duration=500ms


# --- Hikari: non bloccare lo startup se il DB ha problemi ---
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# --- Actuator health: ignora il DB per ora ---
management.health.db.enabled=false

# (opzionale) se usi circuit breaker + actuator health
management.health.circuitbreakers.enabled=false
