server:
  port: 8090

spring:
  application:
    name: ai-assistant-service
  ai:
    ollama:
      base-url: http://ollama:11434
      chat:
        options:
          model: tinyllama  # Modello molto più veloce e leggero
          temperature: 0.7
          num-predict: 100
          timeout: 30s

# URLs degli altri microservizi
services:
  aquariums:
    url: http://aquariums-service:8081
  inhabitants:
    url: http://inhabitants-service:8082
  species:
    url: http://species-service:8083/species
  maintenance:
    url: http://maintenance-service:8084
  parameters:
    url: http://parameters-service:8085
  manual-parameters:
    url: http://manual-parameters-service:8086
  target-parameters:
    url: http://target-parameters-service:8087

logging:
  level:
    it.f3rren.aquarium.ai: DEBUG
    org.springframework.ai: DEBUG

# Actuator Configuration for Monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
    loggers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
